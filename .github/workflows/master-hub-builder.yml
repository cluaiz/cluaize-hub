name: Master Hub Builder

on:
  push:
    branches:
      - main
    paths:
      - 'extensions/**'
      - 'skills/**'
      - 'plugins/**'
      - 'mcp/**'
      - 'souls/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze-changes:
    name: Generate Dynamic Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      should_run: ${{ steps.set-matrix.outputs.should_run }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Needed for git diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Matrix Builder
        id: set-matrix
        run: python .github/scripts/hub-matrix-builder.py

  build-and-release:
    name: Build ${{ matrix.target }} for ${{ matrix.id }}
    needs: analyze-changes
    if: needs.analyze-changes.outputs.should_run == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.analyze-changes.outputs.matrix) }}
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build or Bundle ZIP
        shell: bash
        run: |
          mkdir -p build/
          if [ "${{ matrix.is_zip }}" == "true" ]; then
            echo "Bundling ZIP for ${{ matrix.id }}..."
            cd ${{ matrix.pkg_dir }}
            
            FILES_TO_ZIP="README.md"
            if [ -f "SKILL.md" ]; then FILES_TO_ZIP="$FILES_TO_ZIP SKILL.md"; fi
            if [ -f "manifest-extension.yaml" ]; then FILES_TO_ZIP="$FILES_TO_ZIP manifest-extension.yaml"; fi
            if [ -d "scripts" ]; then FILES_TO_ZIP="$FILES_TO_ZIP scripts"; fi
            if [ -d "references" ]; then FILES_TO_ZIP="$FILES_TO_ZIP references"; fi
            if [ -d "assets" ]; then FILES_TO_ZIP="$FILES_TO_ZIP assets"; fi
            
            zip -r ../../build/${{ matrix.filename }} $FILES_TO_ZIP
            cd -
          else
            echo "Building binary for ${{ matrix.id }} on ${{ matrix.target }}..."
            cd ${{ matrix.pkg_dir }}
            # Run the actual Rust build
            cargo build --release
            cd -
            
            # Locate the compiled native binary and rename it
            if [ "${{ matrix.os }}" == "windows-latest" ]; then
              cp ${{ matrix.pkg_dir }}/target/release/*.dll build/${{ matrix.filename }}
            elif [ "${{ matrix.os }}" == "macos-14" ]; then
              cp ${{ matrix.pkg_dir }}/target/release/*.dylib build/${{ matrix.filename }}
            elif [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
              cp ${{ matrix.pkg_dir }}/target/release/*.so build/${{ matrix.filename }}
            fi
          fi

      - name: Upload to Unified Package Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.tag_name }}
          name: "${{ matrix.title }} - v${{ matrix.version }}"
          body: ${{ matrix.release_body }}
          draft: false
          prerelease: false
          files: build/${{ matrix.filename }}
          fail_on_unmatched_files: true
          append_body: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
